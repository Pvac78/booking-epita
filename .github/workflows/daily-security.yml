name: security

on:
  workflow_dispatch:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  # --- Job 1 : Dependencies Analysis ---
  dependencies-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true

      - name: Upload SARIF report to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif
          category: dependencies-analysis

  # --- Job 2 : Source Code Analysis ---
  source-code-analysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:6e0a8117bb664871e06c7e1e69d7b97e937d578bcfbaf4bcba951919b4fcb545
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run semgrep analysis
        run: semgrep --config "p/default" --sarif --output SourceCodeAnalysis.sarif ./
        continue-on-error: true

      - name: Upload SARIF report to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: SourceCodeAnalysis.sarif
          category: source-code-analysis
