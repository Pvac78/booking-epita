name: Daily Security Pipeline

on:
  workflow_dispatch

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  # --- Job 1 : Analyse des dépendances ---
  DependenciesAnalysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: DependenciesAnalysisFull.sarif
          category: osv-scanner
        continue-on-error: true

  # --- Job 2 : Analyse du code source ---
  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: run semgrep
        uses: returntocorp/semgrep-action@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48
        with:
          config: "p/default"
          generateSarif: "1"
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true
