---
name: PR Security Check

on:
  pull_request:
    branches: [ "main" ]

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  dependencies-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisPR.sarif
            ./
        continue-on-error: true

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: DependenciesAnalysisPR.sarif

  source-code-pr:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: run semgrep differential
        run: semgrep ci --baseline-commit ${{ github.event.pull_request.base.sha }} --config .semgrep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
